services:
  db:
    image: postgres:15
    container_name: dbeaver_demo_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dbeaver_demo
    ports:
      - "5432:5432"
    volumes:
      - ./scripts:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dbeaver_demo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
